name: Semantic Versioning & Changelog

on:
  push:
    branches:
      - main
      - master

jobs:
  semantic-version:
    name: Semantic Version & Changelog
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release and plugins
        run: |
          npm install -D semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/github @semantic-release/commit-analyzer @semantic-release/release-notes-generator conventional-changelog-conventionalcommits

      - name: Create .releaserc configuration
        run: |
          cat > .releaserc.json << 'EOF'
          {
            "branches": ["main", "master"],
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              [
                "@semantic-release/changelog",
                {
                  "changelogFile": "CHANGELOG.md"
                }
              ],
              [
                "@semantic-release/git",
                {
                  "assets": ["CHANGELOG.md", "package.json"],
                  "message": "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
                }
              ],
              [
                "@semantic-release/github",
                {
                  "assets": "CHANGELOG.md"
                }
              ]
            ],
            "preset": "conventionalcommits",
            "presetConfig": {
              "types": [
                { "type": "feat", "section": "Features" },
                { "type": "fix", "section": "Bug Fixes" },
                { "type": "perf", "section": "Performance Improvements" },
                { "type": "refactor", "section": "Refactoring" },
                { "type": "docs", "section": "Documentation" },
                { "type": "style", "section": "Styles" },
                { "type": "chore", "section": "Chores" },
                { "type": "test", "section": "Tests" }
              ]
            }
          }
          EOF

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release
